<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>연산 순서 마스터 v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --bg2: #111827;
  --bg3: #1a2235;
  --border: rgba(255,255,255,0.07);
  --accent: #6366f1;
  --accent2: #22d3ee;
  --accent3: #f59e0b;
  --green: #10b981;
  --red: #ef4444;
  --text: #e2e8f0;
  --muted: #64748b;
  --card-radius: 18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;overflow-x:hidden}
body{
  font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
}

/* ========== 배경 파티클 ========== */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.35}

/* ========== 레이아웃 ========== */
.wrap{max-width:500px;margin:0 auto;padding:16px;position:relative;z-index:1;min-height:100vh}

/* ========== 화면 전환 ========== */
.screen{display:none}
.screen.active{display:block;animation:fadeUp .35s cubic-bezier(.22,1,.36,1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* ========== 공통 버튼 ========== */
.btn{
  border:none;border-radius:12px;font-family:inherit;font-weight:700;cursor:pointer;
  transition:transform .12s, box-shadow .12s, background .15s;
  letter-spacing:.02em;
}
.btn:active{transform:scale(.94)!important}
.btn-primary{
  background:linear-gradient(135deg,var(--accent),#818cf8);
  color:#fff;padding:13px 32px;font-size:.95rem;
  box-shadow:0 4px 20px rgba(99,102,241,.35);
}
.btn-primary:hover{box-shadow:0 6px 28px rgba(99,102,241,.5);transform:translateY(-1px)}
.btn-ghost{background:rgba(255,255,255,.07);color:var(--muted);padding:10px 20px;font-size:.85rem}
.btn-green{background:linear-gradient(135deg,#059669,var(--green));color:#fff;padding:13px 32px;font-size:.95rem;box-shadow:0 4px 20px rgba(16,185,129,.3)}
.btn-icon{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.07);color:var(--text);display:flex;align-items:center;justify-content:center;font-size:1.1rem;border:none;cursor:pointer;transition:.15s}
.btn-icon:active{transform:scale(.9)}

/* ========== 메인 헤더 ========== */
#mainScreen .logo{text-align:center;padding:28px 0 20px}
#mainScreen .logo-title{
  font-family:'Black Han Sans',sans-serif;
  font-size:2rem;letter-spacing:-.01em;
  background:linear-gradient(135deg,var(--accent2),var(--accent),#c084fc);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:4px;
}
#mainScreen .logo-sub{font-size:.78rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}

/* ========== 스텟 바 (메인) ========== */
.main-stats{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;
}
.ms-item{
  background:var(--bg3);border:1px solid var(--border);border-radius:14px;
  padding:12px 8px;text-align:center;
}
.ms-val{font-size:1.3rem;font-weight:900;color:#fff}
.ms-label{font-size:.65rem;color:var(--muted);margin-top:2px;letter-spacing:.04em}

/* ========== 스테이지 그리드 ========== */
.section-title{font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin:0 2px 10px}
.stage-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stage-card{
  border-radius:var(--card-radius);padding:18px 16px;cursor:pointer;
  position:relative;overflow:hidden;border:2px solid transparent;
  transition:transform .2s,box-shadow .2s;
}
.stage-card:hover{transform:translateY(-3px)}
.stage-card:active{transform:scale(.96)}
.stage-card.locked{opacity:.45;cursor:default;filter:grayscale(.5)}
.stage-card .sc-num{font-size:.6rem;font-weight:800;letter-spacing:.12em;opacity:.65;margin-bottom:8px}
.stage-card .sc-icon{font-size:1.7rem;margin-bottom:6px}
.stage-card .sc-name{font-size:.88rem;font-weight:700;color:#fff;margin-bottom:2px}
.stage-card .sc-desc{font-size:.68rem;opacity:.7;line-height:1.4}
.stage-card .sc-stars{font-size:.8rem;margin-top:6px;min-height:16px}
.stage-card.full{grid-column:1/-1}
.stage-card::after{content:'';position:absolute;top:-40%;right:-40%;width:80%;height:80%;background:radial-gradient(circle,rgba(255,255,255,.13) 0%,transparent 65%);pointer-events:none}
.s1{background:linear-gradient(135deg,#065f46,#10b981)}
.s2{background:linear-gradient(135deg,#1e3a8a,#3b82f6)}
.s3{background:linear-gradient(135deg,#78350f,#f59e0b)}
.s4{background:linear-gradient(135deg,#4c1d95,#8b5cf6)}
.s5{background:linear-gradient(135deg,#7f1d1d,#ef4444)}
.s6{background:linear-gradient(135deg,#164e63,#06b6d4)}
.s7{background:linear-gradient(135deg,#701a75,#d946ef)}

/* 업적 미리보기 버튼 */
.achievement-btn{
  width:100%;padding:14px;background:var(--bg3);border:1px solid var(--border);
  border-radius:14px;color:var(--text);font-size:.88rem;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;
  transition:.2s;
}
.achievement-btn:hover{background:rgba(255,255,255,.08);transform:translateX(2px)}

/* ========== 규칙 패널 ========== */
.rules-panel{
  background:var(--bg3);border:1px solid var(--border);border-radius:14px;
  padding:14px 16px;margin-bottom:16px;
}
.rules-panel h3{font-size:.72rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.rules-panel ul{list-style:none}
.rules-panel li{font-size:.8rem;color:#94a3b8;padding:4px 0;display:flex;align-items:center;gap:8px}
.rules-panel li::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}

/* ========== 게임 화면 ========== */
.game-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.game-stage-title{flex:1;font-size:.95rem;font-weight:700}
.game-badge{padding:4px 12px;border-radius:20px;font-size:.68rem;font-weight:800;color:#fff;letter-spacing:.05em}

/* 스코어보드 */
.scoreboard{
  display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px;
}
.sb-item{
  background:var(--bg3);border:1px solid var(--border);border-radius:12px;
  padding:8px 4px;text-align:center;
}
.sb-label{font-size:.58rem;color:var(--muted);letter-spacing:.06em;margin-bottom:1px}
.sb-val{font-size:1.2rem;font-weight:900;color:#fff;transition:all .25s}
.sb-val.pop{animation:numPop .3s ease}
@keyframes numPop{0%{transform:scale(1)}50%{transform:scale(1.35);color:var(--accent3)}100%{transform:scale(1)}}

/* 난이도 바 */
.diff-bar{display:flex;gap:6px;margin-bottom:10px}
.diff-btn{
  flex:1;padding:8px;border:2px solid rgba(255,255,255,.1);border-radius:10px;
  background:transparent;color:#94a3b8;font-size:.78rem;font-weight:700;cursor:pointer;
  transition:.2s;font-family:inherit;
}
.diff-btn.active{background:rgba(99,102,241,.2);border-color:var(--accent);color:var(--accent)}

/* 프로그레스 */
.progress-wrap{margin-bottom:12px}
.progress-track{height:6px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.34,1.56,.64,1);background:linear-gradient(90deg,var(--accent),var(--accent2))}
.progress-label{display:flex;justify-content:space-between;margin-top:4px;font-size:.65rem;color:var(--muted)}

/* 게임 카드 */
.game-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:20px;
  padding:20px 16px;margin-bottom:12px;min-height:290px;
  position:relative;overflow:hidden;
}
.game-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));opacity:.6;
}

/* 타이머 */
.timer-wrap{margin-bottom:16px}
.timer-track{height:6px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
.timer-fill{height:100%;border-radius:3px;transition:width .8s linear;background:linear-gradient(90deg,var(--green),#34d399)}
.timer-fill.warn{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.timer-fill.danger{background:linear-gradient(90deg,var(--red),#f87171)}
.timer-fill.critical{animation:blink .45s infinite}
.timer-row{display:flex;justify-content:space-between;margin-top:5px;font-size:.7rem;color:var(--muted)}
.timer-sec{font-weight:800;color:var(--green);transition:color .3s}
.timer-sec.warn{color:#f59e0b}
.timer-sec.danger{color:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* 프리게임 */
.pre-game{text-align:center;padding:24px 0}
.pre-icon{font-size:3.2rem;margin-bottom:12px}
.pre-title{font-family:'Black Han Sans',sans-serif;font-size:1.4rem;color:#fff;margin-bottom:6px}
.pre-desc{font-size:.83rem;color:var(--muted);line-height:1.6;margin-bottom:22px}
.pre-tip{
  background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.25);
  border-radius:10px;padding:10px 14px;font-size:.78rem;color:#a5b4fc;
  margin-bottom:20px;text-align:left;line-height:1.5;
}
.pre-tip strong{color:#818cf8}

/* 수식 영역 */
.expr-area{
  display:flex;align-items:center;justify-content:center;
  flex-wrap:wrap;gap:4px;padding:14px 4px;min-height:90px;
}
.e-num{font-size:1.95rem;font-weight:900;color:#f1f5f9;min-width:30px;text-align:center;padding:0 3px}
.e-op{
  position:relative;width:50px;height:50px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;font-weight:700;cursor:pointer;
  border:2.5px solid #2d3748;background:rgba(255,255,255,.04);color:#64748b;
  transition:transform .12s, border-color .15s, background .15s;
}
.e-op:hover{border-color:#475569;background:rgba(255,255,255,.08);transform:scale(1.05)}
.e-op:active{transform:scale(.88)}
.e-op.selected{
  background:var(--accent);color:#fff;border-color:var(--accent);cursor:default;
  box-shadow:0 0 16px rgba(99,102,241,.5);
  animation:selectPop .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes selectPop{0%{transform:scale(1)}50%{transform:scale(1.25)}100%{transform:scale(1)}}
.e-op.wrong{animation:shake .4s;border-color:var(--red);background:rgba(239,68,68,.15)}
.e-op.revealed{background:var(--green);color:#fff;border-color:var(--green);cursor:default}
.e-op.disabled{pointer-events:none;opacity:.35}
.e-paren{font-size:2.3rem;font-weight:300;color:#818cf8;padding:0 1px}
.e-paren.inner{color:#f472b6}
.order-badge{
  position:absolute;top:-9px;right:-9px;width:22px;height:22px;border-radius:50%;
  background:var(--accent3);color:#0f172a;font-size:.7rem;font-weight:900;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(251,191,36,.5);
}

/* 문장제 */
.wp-box{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:14px;padding:16px;margin-bottom:14px;font-size:.9rem;
  line-height:1.75;color:#e2e8f0;
}
.wp-expr{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 0;flex-wrap:wrap}
.wp-num{font-size:1.7rem;font-weight:900;color:#f1f5f9}
.wp-blank{
  width:50px;height:50px;border-radius:14px;border:2.5px dashed #374151;
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;font-weight:700;color:#4b5563;cursor:pointer;
  transition:.2s;background:rgba(255,255,255,.03);
}
.wp-blank.active{border-color:var(--accent);border-style:solid;background:rgba(99,102,241,.1);color:var(--accent);animation:pulse2 1.1s infinite}
.wp-blank.filled{border-style:solid;border-color:#374151;color:#e2e8f0}
.wp-blank.filled.active{border-color:var(--accent);color:var(--accent)}
.wp-blank.correct-mark{border-color:var(--green);color:var(--green);background:rgba(16,185,129,.1);border-style:solid}
.wp-blank.wrong-mark{border-color:var(--red);color:var(--red);background:rgba(239,68,68,.1);border-style:solid}
.wp-eq{font-size:1.7rem;font-weight:700;color:var(--muted)}
@keyframes pulse2{0%,100%{box-shadow:0 0 0 0 rgba(99,102,241,.4)}50%{box-shadow:0 0 0 8px rgba(99,102,241,0)}}

.op-palette{display:flex;justify-content:center;gap:10px;margin:12px 0}
.op-btn{
  width:56px;height:56px;border-radius:16px;border:2px solid rgba(255,255,255,.1);
  background:var(--bg3);color:#e2e8f0;font-size:1.6rem;font-weight:700;cursor:pointer;
  transition:.15s;font-family:inherit;
}
.op-btn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25);transform:scale(1.06)}
.op-btn:active{transform:scale(.9)}

/* 숫자 입력 */
.answer-row{display:flex;align-items:center;justify-content:center;gap:10px;margin:14px 0 10px;font-size:1rem;font-weight:700;color:var(--muted)}
.answer-display{
  min-width:90px;height:54px;border-radius:14px;
  background:rgba(255,255,255,.05);border:2px solid #2d3748;
  display:flex;align-items:center;justify-content:center;
  font-size:1.9rem;font-weight:900;color:#fff;transition:.2s;
}
.answer-display.correct-ans{border-color:var(--green);color:var(--green);background:rgba(16,185,129,.1)}
.answer-display.wrong-ans{border-color:var(--red);color:var(--red);background:rgba(239,68,68,.1)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:270px;margin:0 auto}
.num-btn{
  height:52px;border-radius:13px;border:1.5px solid #2d3748;
  background:var(--bg3);color:#e2e8f0;font-size:1.2rem;font-weight:700;
  cursor:pointer;transition:.12s;font-family:inherit;
}
.num-btn:hover{background:rgba(255,255,255,.1);border-color:#4b5563}
.num-btn:active{background:#374151;transform:scale(.93)}
.num-btn.confirm-btn{background:linear-gradient(135deg,var(--accent),#818cf8);border-color:var(--accent);color:#fff}
.num-btn.del-btn{color:#f87171}

/* 안내/해설 */
.instruction{text-align:center;margin-top:12px;font-size:.88rem;color:var(--muted);min-height:22px}
.instruction.ok{color:var(--green);font-weight:700;font-size:1.05rem}
.instruction.err{color:var(--red);font-weight:600}
.instruction.timeout{color:var(--red);font-weight:700}
.time-bonus{display:none;text-align:center;margin-top:4px;font-size:.82rem;font-weight:700;color:var(--accent2)}
.time-bonus.show{display:block;animation:popIn .5s ease}

/* 연속 콤보 표시 */
.combo-badge{
  display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Black Han Sans',sans-serif;font-size:2rem;color:var(--accent3);
  text-shadow:0 0 30px rgba(245,158,11,.8);pointer-events:none;z-index:200;
}
.combo-badge.show{display:block;animation:comboPop .8s forwards}
@keyframes comboPop{
  0%{opacity:0;transform:translate(-50%,-80%) scale(.5)}
  25%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}
  70%{opacity:1;transform:translate(-50%,-50%) scale(1)}
  100%{opacity:0;transform:translate(-50%,-30%) scale(.9)}
}

.explanation{
  display:none;background:rgba(16,185,129,.06);
  border:1px solid rgba(16,185,129,.18);border-radius:13px;
  padding:12px 14px;margin-top:12px;
}
.explanation.show{display:block;animation:popIn .3s ease}
.explanation h4{color:#34d399;margin-bottom:8px;font-size:.83rem;letter-spacing:.04em}
.explanation .step{font-size:.8rem;color:#6ee7b7;padding:4px 0;border-bottom:1px dashed rgba(16,185,129,.12);display:flex;align-items:center;gap:8px}
.explanation .step:last-child{border:none}
.step-badge{width:20px;height:20px;border-radius:50%;background:var(--green);color:#fff;font-size:.62rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* 버튼 영역 */
.btn-area{display:flex;gap:8px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}

/* 확인 버튼 */
.btn-check{
  padding:12px 38px;border:none;border-radius:13px;font-size:.95rem;font-weight:700;
  cursor:pointer;background:linear-gradient(135deg,#059669,var(--green));color:#fff;
  margin-top:8px;display:none;font-family:inherit;
  box-shadow:0 4px 16px rgba(16,185,129,.3);transition:.15s;
}
.btn-check.show{display:inline-block;animation:popIn .3s}
.btn-check:active{transform:scale(.95)}

/* ========== 결과 모달 ========== */
.modal-bg{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:300;align-items:center;justify-content:center;padding:20px;
  backdrop-filter:blur(6px);
}
.modal-bg.show{display:flex}
.modal{
  background:var(--bg2);border:1px solid rgba(255,255,255,.1);
  border-radius:24px;padding:32px 24px;text-align:center;
  max-width:400px;width:100%;animation:popIn .35s cubic-bezier(.34,1.56,.64,1);
  position:relative;overflow:hidden;
}
.modal::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--accent),var(--accent2),#c084fc);
}
.modal .m-emoji{font-size:3.5rem;margin-bottom:10px}
.modal h2{font-family:'Black Han Sans',sans-serif;font-size:1.5rem;color:#fff;margin-bottom:6px}
.modal p{color:var(--muted);margin-bottom:18px;font-size:.87rem;line-height:1.5}
.result-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
.rs-item{background:var(--bg3);border-radius:13px;padding:14px 10px}
.rs-val{font-size:1.5rem;font-weight:900;color:#fff}
.rs-label{font-size:.65rem;color:var(--muted);margin-top:2px;letter-spacing:.04em}
.result-grade{
  font-family:'Black Han Sans',sans-serif;font-size:1rem;
  padding:10px 20px;border-radius:10px;margin-bottom:18px;letter-spacing:.04em;
}
.grade-s{background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.3)}
.grade-a{background:rgba(99,102,241,.15);color:#818cf8;border:1px solid rgba(99,102,241,.3)}
.grade-b{background:rgba(16,185,129,.12);color:#34d399;border:1px solid rgba(16,185,129,.25)}
.grade-c{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.modal-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.m-btn{padding:12px 26px;border:none;border-radius:12px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
.m-btn:active{transform:scale(.95)}
.m-btn-primary{background:linear-gradient(135deg,var(--accent),#818cf8);color:#fff}
.m-btn-secondary{background:rgba(255,255,255,.07);color:var(--muted)}

/* ========== 업적 모달 ========== */
#achieveModal .modal{max-width:440px;text-align:left;padding:28px 20px}
#achieveModal .modal h2{text-align:center;margin-bottom:16px}
.achieve-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-height:65vh;overflow-y:auto;padding-right:2px}
.achieve-grid::-webkit-scrollbar{width:4px}
.achieve-grid::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.ach-item{
  background:var(--bg3);border:1px solid var(--border);border-radius:13px;
  padding:12px 10px;text-align:center;transition:.2s;
}
.ach-item.unlocked{border-color:rgba(251,191,36,.35);background:rgba(251,191,36,.06)}
.ach-item.locked{opacity:.45;filter:grayscale(.7)}
.ach-icon{font-size:1.8rem;margin-bottom:6px}
.ach-name{font-size:.75rem;font-weight:700;color:#fff;margin-bottom:2px}
.ach-desc{font-size:.65rem;color:var(--muted);line-height:1.3}
.ach-item.unlocked .ach-name{color:#fbbf24}

/* 업적 알림 토스트 */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--bg2);border:1px solid rgba(251,191,36,.4);border-radius:14px;

/* 랭킹 */

  display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;transition:.2s;
}

#rankModal .modal{max-width:420px;text-align:left;padding:28px 20px}

/* 유틸 */
@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

/* 화면 플래시 */
.flash-overlay{
  position:fixed;inset:0;pointer-events:none;z-index:500;opacity:0;
  transition:opacity .08s;
}
.flash-overlay.green{background:rgba(16,185,129,.18)}
.flash-overlay.red{background:rgba(239,68,68,.18)}
.flash-overlay.active{opacity:1}
</style>
</head>
<body>

<!-- 배경 캔버스 -->
<canvas id="bg-canvas"></canvas>

<!-- 플래시 오버레이 -->

<!-- 업적 토스트 -->
<div class="toast" id="toast"><div class="toast-icon">🏆</div><div id="toastMsg"></div></div>

<div class="wrap">

<!-- ===== 메인 화면 ===== -->
<div id="mainScreen" class="screen active">
  <div class="logo">
    <div class="logo-title">연산 순서 마스터</div>

    <div class="ms-item"><div class="ms-val" id="msAchieve">0</div><div class="ms-label">업적</div></div>
    <div class="ms-item"><div class="ms-val" id="msBestStreak">0</div><div class="ms-label">최고연속</div></div>
  </div>

  <div class="section-title">스테이지 선택</div>
  <div class="stage-grid" id="stageGrid"></div>

  <button class="achievement-btn" onclick="showAchievements()">
    <span>🏆 업적 &nbsp;<span id="achieveCount">0/0</span></span>
    <span style="color:var(--muted)">보기 →</span>
  </button>
  <button class="ranking-btn" onclick="showRanking()">

  <div class="rules-panel">

<!-- ===== 게임 화면 ===== -->
<div id="gameScreen" class="screen">
  <div class="game-top">

    <div class="game-stage-title" id="gTitle"></div>

  <div class="scoreboard">
    <div class="sb-item"><div class="sb-label">점수</div><div class="sb-val" id="uiScore">0</div></div>

  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progFill" style="width:0"></div></div>
    <div class="progress-label"><span id="progLeft">0문제 완료</span><span id="progRight">10문제</span></div>

  <div class="btn-area" id="btnArea" style="display:none">
    <button class="btn btn-ghost" onclick="resetQ()">↺ 다시</button>
    <button class="btn btn-ghost" style="color:#fbbf24;background:rgba(251,191,36,.1)" onclick="doHint()">💡 힌트</button>
    <button class="btn btn-primary" id="nextBtn" onclick="nextQ()" style="display:none">다음 ▶</button>
  </div>
</div>

</div><!-- /wrap -->

<!-- ===== 결과 모달 ===== -->
<div class="modal-bg" id="resultModal">
  <div class="modal">
    <div class="m-emoji" id="mEmoji">🎉</div>
    <h2 id="mTitle">잘했어요!</h2>
    <div class="result-grade" id="mGrade"></div>
    <p id="mMsg"></p>
    <div class="result-stats">
      <div class="rs-item"><div class="rs-val" id="mScore">0</div><div class="rs-label">최종 점수</div></div>
      <div class="rs-item"><div class="rs-val" id="mCorrect">0</div><div class="rs-label">정답률</div></div>
      <div class="rs-item"><div class="rs-val" id="mStreak">0</div><div class="rs-label">최고 연속</div></div>
      <div class="rs-item"><div class="rs-val" id="mTime">+0</div><div class="rs-label">시간 보너스</div></div>

</div>

<!-- ===== 업적 모달 ===== -->
<div class="modal-bg" id="achieveModal">
  <div class="modal">
    <h2>🏆 업적</h2>
    <div class="achieve-grid" id="achieveGrid"></div>
    <div style="text-align:center;margin-top:14px">
      <button class="m-btn m-btn-secondary" onclick="$('achieveModal').classList.remove('show')">닫기</button>
    </div>
  </div>
</div>

<!-- ===== 랭킹 모달 ===== -->
<div class="modal-bg" id="rankModal">
  <div class="modal">
    <h2>🥇 명예의 전당</h2>
    <ul class="rank-list" id="rankList"></ul>
    <div style="text-align:center;margin-top:14px">
      <button class="m-btn m-btn-secondary" onclick="$('rankModal').classList.remove('show')">닫기</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// Web Audio API 사운드
// ============================================================
let AC = null;
function getAC(){
  if(!AC){
    try{ AC = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){}
  }
  if(AC && AC.state==='suspended') AC.resume();
  return AC;
}

function playTone(freq, type='sine', dur=0.12, vol=0.18, delay=0){
  const ac = getAC(); if(!ac) return;
  try{
    const o=ac.createOscillator(), g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type=type; o.frequency.value=freq;
    const t=ac.currentTime+delay;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t); o.stop(t+dur);
  }catch(e){}
}

const SFX = {
  click(){playTone(600,'sine',.08,.12)},
  correct(){
    playTone(523,'sine',.12,.2);
    playTone(659,'sine',.12,.2,.12);
    playTone(784,'sine',.18,.22,.24);
  },
  wrong(){
    playTone(300,'sawtooth',.15,.18);
    playTone(220,'sawtooth',.12,.14,.1);
  },
  combo(n){
    const freqs=[523,587,659,698,784,880,988,1047];
    const f=freqs[Math.min(n-3,freqs.length-1)];
    playTone(f*0.75,'triangle',.06,.12);
    playTone(f,'triangle',.12,.2,.06);
    playTone(f*1.5,'triangle',.18,.18,.12);
  },
  timeup(){
    playTone(400,'square',.1,.15);
    playTone(300,'square',.18,.15,.1);
    playTone(200,'square',.25,.15,.2);
  },
  select(){playTone(700,'triangle',.07,.1)},
  achieve(){
    [523,659,784,1047].forEach((f,i)=>playTone(f,'sine',.2,.2,i*.1));
  },
  start(){
    [400,500,600].forEach((f,i)=>playTone(f,'sine',.12,.15,i*.08));
  }
};

// ============================================================
// 배경 파티클
// ============================================================
(function(){
  const c=document.getElementById('bg-canvas');
  const ctx=c.getContext('2d');
  const P=[];
  function resize(){c.width=innerWidth;c.height=innerHeight;}
  resize();
  window.addEventListener('resize',resize);
  for(let i=0;i<55;i++) P.push({
    x:Math.random()*innerWidth, y:Math.random()*innerHeight,
    r:Math.random()*1.8+.5, vx:(Math.random()-.5)*.25, vy:(Math.random()-.5)*.25,
    op:Math.random()*.5+.2
  });
  function frame(){
    ctx.clearRect(0,0,c.width,c.height);
    P.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0)p.x=c.width; if(p.x>c.width)p.x=0;
      if(p.y<0)p.y=c.height; if(p.y>c.height)p.y=0;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(99,102,241,${p.op})`; ctx.fill();
    });
    requestAnimationFrame(frame);
  }
  frame();
})();

// ============================================================
// 데이터 / 설정
// ============================================================
const STAGES = [
  {id:1,name:'덧셈과 뺄셈',desc:'같은 우선순위, 왼쪽부터! 고난이도엔 괄호도!',icon:'➕➖',cls:'s1',ops:['+','-'],type:'order',color:'#10b981'},
  {id:2,name:'곱셈과 나눗셈',desc:'곱하기·나누기도 왼쪽부터 차례대로!',icon:'✖️➗',cls:'s2',ops:['×','÷'],type:'order',color:'#3b82f6'},
  {id:3,name:'덧뺄·곱셈 혼합',desc:'곱셈이 덧셈보다 먼저! 순서에 주의!',icon:'➕✖️',cls:'s3',ops:['+','-','×'],type:'order',color:'#f59e0b'},
  {id:4,name:'덧뺄·나눗셈 혼합',desc:'나눗셈이 먼저인 걸 기억하세요!',icon:'➕➗',cls:'s4',ops:['+','-','÷'],type:'order',color:'#8b5cf6'},
  {id:5,name:'사칙연산 종합',desc:'모든 연산이 섞인 최강 도전!',icon:'🔢',cls:'s5',ops:['+','-','×','÷'],type:'order',color:'#ef4444'},
  {id:6,name:'문장제 → 식 세우기',desc:'문장을 읽고 알맞은 연산 기호를 넣어요!',icon:'📝',cls:'s6',ops:[],type:'word-ops',color:'#06b6d4'},
  {id:7,name:'문장제 → 답 구하기',desc:'문장제를 읽고 직접 정답을 계산하세요!',icon:'🧠',cls:'s7',ops:[],type:'word-answer',color:'#d946ef'},
];
const TOTAL_Q=10;
const TIME_CFG={order:{1:30,2:25,3:20},'word-ops':{1:45,2:35,3:28},'word-answer':{1:50,2:40,3:30}};

// ============================================================
// 영속 데이터 (localStorage)
// ============================================================
const SAVE_KEY='mathmaster_v2';
let Save={totalScore:0,bestStreak:0,stageStars:{},achievements:{},rankingScores:[]};
function loadSave(){
  try{const d=localStorage.getItem(SAVE_KEY);if(d)Save=JSON.parse(d);}catch(e){}
  if(!Save.stageStars)Save.stageStars={};
  if(!Save.achievements)Save.achievements={};
  if(!Save.rankingScores)Save.rankingScores=[];
}
function writeSave(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(Save));}catch(e){}}
loadSave();

// ============================================================
// 업적 정의
// ============================================================
const ACHIEVEMENTS=[
  {id:'first_correct',icon:'⭐',name:'첫 정답!',desc:'처음으로 문제를 맞췄다'},
  {id:'streak3',icon:'🔥',name:'3연속 정답',desc:'3문제 연속으로 정답'},
  {id:'streak5',icon:'💥',name:'5연속 정답',desc:'5문제 연속으로 정답'},
  {id:'streak10',icon:'⚡',name:'퍼펙트 콤보',desc:'10문제 전부 연속 정답'},
  {id:'no_hint',icon:'🧠',name:'힌트 없이 클리어',desc:'힌트 없이 스테이지 완주'},
  {id:'speed_demon',icon:'⚡',name:'스피드 킹',desc:'시간 보너스 50점 이상 획득'},
  {id:'all_stages',icon:'🌟',name:'모든 스테이지 도전',desc:'7개 스테이지 모두 플레이'},
  {id:'score500',icon:'💎',name:'500점 달성',desc:'한 게임에서 500점 이상'},
  {id:'score1000',icon:'👑',name:'1000점 달성',desc:'한 게임에서 1000점 이상'},
  {id:'stage5_s',icon:'🏆',name:'종합 마스터',desc:'사칙연산 종합 S등급 달성'},
  {id:'no_mistake',icon:'🎯',name:'실수 없는 도전',desc:'한 게임에서 실수 0번'},
  {id:'comeback',icon:'💪',name:'포기하지 않아',desc:'시간초과 후 다음 문제 도전'},
];

function unlockAchievement(id){
  if(Save.achievements[id]) return;
  Save.achievements[id]=Date.now();
  writeSave();
  const ach=ACHIEVEMENTS.find(a=>a.id===id);
  if(ach) showToast(ach.icon+' 업적 달성: '+ach.name);
  SFX.achieve();
  updateMainStats();
}

function showToast(msg){
  const t=$('toast'); $('toastMsg').textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// ============================================================
// 상태
// ============================================================
let S={
  stageId:1,diff:1,score:0,streak:0,maxStreak:0,
  qNum:0,correct:0,totalTimeBonus:0,
  hintUsedThisGame:false,mistakeCount:0,timeoutCount:0,
  expr:null,correctOrder:[],userOrder:[],step:0,
  hintUsed:false,mistake:false,done:false,
  totalTime:30,timeLeft:30,timer:null,
  wp:null,wpUserOps:[],wpActiveSlot:0,wpAnswer:'',
  stagesPlayed:new Set(),
};

const ri=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const pick=a=>a[ri(0,a.length-1)];
const $=id=>document.getElementById(id);

// ============================================================
// 플래시 효과
// ============================================================
function flash(color){
  const el=$('flashOverlay');
  el.className='flash-overlay '+color+' active';
  setTimeout(()=>el.classList.remove('active'),180);
}

// ============================================================
// 메인 화면
// ============================================================
function updateMainStats(){
  $('msTotalScore').textContent=Save.totalScore;
  $('msBestStreak').textContent=Save.bestStreak;
  const unlocked=Object.keys(Save.achievements).length;
  $('msAchieve').textContent=unlocked;
  $('achieveCount').textContent=unlocked+'/'+ACHIEVEMENTS.length;
}

function renderStages(){
  $('stageGrid').innerHTML=STAGES.map(s=>{
    const stars=Save.stageStars[s.id]||0;
    const starHtml='★'.repeat(stars)+'☆'.repeat(3-stars);
    const full=s.id===7?'full':'';
    return `<div class="stage-card ${s.cls} ${full}" onclick="selectStage(${s.id})">
      <div class="sc-num">STAGE ${s.id}</div>
      <div class="sc-icon">${s.icon}</div>
      <div class="sc-name">${s.name}</div>
      <div class="sc-desc">${s.desc}</div>
      <div class="sc-stars" style="color:${stars>0?'#fbbf24':'#374151'}">${starHtml}</div>
    </div>`;
  }).join('');
}

function selectStage(id){
  SFX.click();
  S.stageId=id;
  S.diff=1;
  S.stagesPlayed.add(id);
  if(S.stagesPlayed.size>=7) unlockAchievement('all_stages');
  const st=STAGES[id-1];
  $('mainScreen').classList.remove('active');
  $('gameScreen').classList.add('active');
  $('gTitle').textContent=st.name;
  $('gBadge').textContent='STAGE '+id;
  $('gBadge').style.background=st.color;
  $('diffBar').innerHTML=[{l:1,t:'쉬움 🌱'},{l:2,t:'보통 ⚔️'},{l:3,t:'어려움 💀'}].map(d=>
    `<button class="diff-btn${d.l===1?' active':''}" data-l="${d.l}" onclick="setDiff(${d.l})">${d.t}</button>`
  ).join('');
  showPreGame();
}

function setDiff(l){
  SFX.click();
  S.diff=l;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.toggle('active',+b.dataset.l===l));
}

function goBack(){
  stopTimer();
  $('resultModal').classList.remove('show');
  $('gameScreen').classList.remove('active');
  $('mainScreen').classList.add('active');
  updateMainStats();
  renderStages();
}

// ============================================================
// 프리게임
// ============================================================
function showPreGame(){
  const st=STAGES[S.stageId-1];
  const stars=Save.stageStars[S.stageId]||0;
  const tips={
    order:'연산 기호를 계산해야 할 순서대로 터치하세요!',
    'word-ops':'문장을 읽고 빈칸에 알맞은 연산 기호를 선택하세요!',
    'word-answer':'문장을 읽고 정답을 직접 계산해서 입력하세요!',
  };
  $('btnArea').style.display='none';
  $('gameCard').innerHTML=`
    <div class="pre-game">
      <div class="pre-icon">${st.icon}</div>
      <div class="pre-title">${st.name}</div>
      <div class="pre-desc">${st.desc}</div>
      <div class="pre-tip"><strong>💡 플레이 방법:</strong> ${tips[st.type]}<br>힌트 없이 실수 없이 클리어하면 보너스 점수!</div>
      ${stars>0?`<div style="margin-bottom:14px;color:#fbbf24;font-size:1rem">내 기록: ${'★'.repeat(stars)}${'☆'.repeat(3-stars)}</div>`:''}
      <button class="btn btn-primary" onclick="startGame()">게임 시작 ▶</button>
    </div>`;
  $('uiScore').textContent='0';$('uiStreak').textContent='0';$('uiQ').textContent='0/'+TOTAL_Q;
  $('progFill').style.width='0';$('progLeft').textContent='0문제 완료';
  $('diffBar').style.display='flex';
}

// ============================================================
// 게임 시작/재시작
// ============================================================
function startGame(){
  SFX.start();
  S.score=0;S.streak=0;S.maxStreak=0;S.qNum=0;S.correct=0;S.totalTimeBonus=0;
  S.hintUsedThisGame=false;S.mistakeCount=0;S.timeoutCount=0;
  $('uiScore').textContent='0';$('uiStreak').textContent='0';
  $('diffBar').style.display='none';
  $('btnArea').style.display='flex';
  nextQ();
}
function restartGame(){
  $('resultModal').classList.remove('show');
  startGame();
}

// ============================================================
// 타이머
// ============================================================
function startTimer(){
  stopTimer();
  const st=STAGES[S.stageId-1];
  S.totalTime=TIME_CFG[st.type][S.diff];
  S.timeLeft=S.totalTime;
  S.done=false;
  updTimer();
  S.timer=setInterval(()=>{S.timeLeft--;updTimer();if(S.timeLeft<=0){stopTimer();onTimeUp();}},1000);
}
function stopTimer(){if(S.timer){clearInterval(S.timer);S.timer=null;}}
function updTimer(){
  const pct=(S.timeLeft/S.totalTime)*100;
  const f=document.querySelector('.timer-fill');
  const t=document.querySelector('.timer-sec');

function genOrderQ(){
  const st=STAGES[S.stageId-1];
  S.expr=generateExpr(st.ops,S.diff);
  S.correctOrder=calcOrder(S.expr);
  renderOrderGame();
  startTimer();

function generateExpr(availOps,diff){
  let numCount=diff===1?3:diff===2?4:5;
  let ops=[],numbers=[],parenGroups=[];
  const hasHigh=availOps.some(o=>o==='×'||o==='÷');
  const hasLow=availOps.some(o=>o==='+'||o==='-');
  const mixed=hasHigh&&hasLow;
  for(let i=0;i<numCount-1;i++) ops.push(pick(availOps));
  if(mixed){
    if(!ops.some(o=>o==='×'||o==='÷')) ops[ri(0,ops.length-1)]=pick(availOps.filter(o=>o==='×'||o==='÷'));
    if(!ops.some(o=>o==='+'||o==='-')){
      let idx=ri(0,ops.length-1),t=0;
      while((ops[idx]==='+'||ops[idx]==='-')&&t<10){idx=ri(0,ops.length-1);t++;}
      ops[idx]=pick(availOps.filter(o=>o==='+'||o==='-'));
    }
  }
  numbers=Array.from({length:numCount},()=>ri(2,diff===3?15:diff===2?12:9));
  for(let i=0;i<ops.length;i++){
    if(ops[i]==='÷'){const d=ri(2,6);numbers[i]=d*ri(1,5);numbers[i+1]=d;}
  }
  const parenChance=diff===1?0.55:diff===2?0.75:0.9;
  if(Math.random()<parenChance&&numCount>=3){
    if(mixed){
      const cands=[];
      for(let i=0;i<ops.length;i++){
        if(ops[i]==='+'||ops[i]==='-'){
          if((i>0&&(ops[i-1]==='×'||ops[i-1]==='÷'))||(i<ops.length-1&&(ops[i+1]==='×'||ops[i+1]==='÷')))
            cands.push(i);
        }
      }
      if(cands.length>0){
        const p=pick(cands); parenGroups.push({numStart:p,numEnd:p+1});
        if(diff>=3&&cands.length>1&&Math.random()<.5){
          for(const c of cands){if(Math.abs(c-p)>=2){parenGroups.push({numStart:c,numEnd:c+1});break;}}
        }
      } else if(numCount>=4) parenGroups.push({numStart:0,numEnd:1});
    } else {
      if(diff>=2){const start=Math.max(1,ri(1,numCount-2));if(start<numCount-1)parenGroups.push({numStart:start,numEnd:start+1});}
      if(diff>=3&&numCount>=5&&Math.random()<.5){
        if(parenGroups.length>0){const g=parenGroups[0];if(g.numStart>0)parenGroups.push({numStart:g.numStart-1,numEnd:g.numEnd});}
        else parenGroups.push({numStart:1,numEnd:2});
      }
    }
  }
  return{numbers,ops,parenGroups};
}

function getDepth(i,groups){let d=0;for(const g of groups)if(i>=g.numStart&&i<g.numEnd)d++;return d;}

function calcOrder(expr){
  const{ops,parenGroups}=expr;
  const infos=ops.map((op,i)=>({i,depth:getDepth(i,parenGroups),pri:(op==='×'||op==='÷')?0:1}));
  infos.sort((a,b)=>b.depth-a.depth||a.pri-b.pri||a.i-b.i);
  return infos.map(x=>x.i);
}

function renderOrderGame(){
  const{numbers,ops,parenGroups}=S.expr;
  let html=timerHTML();
  html+=`<div class="expr-area">`;
  for(let i=0;i<numbers.length;i++){
    const opens=parenGroups.filter(g=>g.numStart===i).sort((a,b)=>(b.numEnd-b.numStart)-(a.numEnd-a.numStart));
    for(const g of opens){
      const inner=parenGroups.some(g2=>g2!==g&&g2.numStart<=g.numStart&&g2.numEnd>=g.numEnd);
      html+=`<span class="e-paren${inner?' inner':''}">(</span>`;
    }
    html+=`<span class="e-num">${numbers[i]}</span>`;
    const closes=parenGroups.filter(g=>g.numEnd===i).sort((a,b)=>(a.numEnd-a.numStart)-(b.numEnd-b.numStart));
    for(const g of closes){
      const inner=parenGroups.some(g2=>g2!==g&&g2.numStart<=g.numStart&&g2.numEnd>=g.numEnd);
      html+=`<span class="e-paren${inner?' inner':''})">)</span>`;
    }
    if(i<ops.length)
      html+=`<div class="e-op" data-i="${i}" onclick="opClick(${i})" ontouchend="event.preventDefault();opClick(${i})">${ops[i]}</div>`;
  }
  html+=`</div>`;
  html+=`<div class="instruction" id="inst">계산 순서대로 연산 기호를 터치하세요!</div>`;
  html+=`<div class="time-bonus" id="tBonus"></div>`;
  html+=`<div class="explanation" id="expl"></div>`;
  $('gameCard').innerHTML=html;
}

function opClick(i){
  if(S.done||S.userOrder.includes(i)||S.step>=S.correctOrder.length) return;
  SFX.select();
  const el=document.querySelector(`.e-op[data-i="${i}"]`);
  if(i===S.correctOrder[S.step]){
    S.userOrder.push(i);S.step++;
    el.classList.add('selected');
    el.innerHTML=S.expr.ops[i]+`<div class="order-badge">${S.step}</div>`;
    if(S.step>=S.correctOrder.length) onCorrect();
    else setInst(`${S.step}번째 완료! 다음 순서를 터치하세요.`,'');
  } else {
    S.mistake=true;S.mistakeCount++;
    el.classList.add('wrong');
    setTimeout(()=>el.classList.remove('wrong'),400);
    setInst('순서가 틀렸어요! 다시 생각해보세요.','err');
    SFX.wrong(); flash('red');
  }
}

function getWPByDiff(diff){
  if(diff===1) return WORD_PROBLEMS.filter(w=>w.tags.includes('+-'));
  if(diff===2) return WORD_PROBLEMS.filter(w=>w.tags.includes('mix')||w.tags.includes('+-'));
  return WORD_PROBLEMS;
}
function evalExpr(nums,ops){
  let n=[...nums],o=[...ops],i=0;
  while(i<o.length){
    if(o[i]==='×'||o[i]==='÷'){n.splice(i,2,o[i]==='×'?n[i]*n[i+1]:n[i]/n[i+1]);o.splice(i,1);}else i++;
  }
  let r=n[0];for(i=0;i<o.length;i++)r=o[i]==='+'?r+n[i+1]:r-n[i+1];return r;
}
function pickWP(diff){
  const pool=getWPByDiff(diff);
  for(let t=0;t<30;t++){
    const tmpl=pick(pool);const nums=tmpl.gen();const ans=evalExpr(nums,[...tmpl.ops]);
    if(Number.isInteger(ans)&&ans>=0&&ans<10000){
      let txt=tmpl.text;nums.forEach((n,i)=>txt=txt.replaceAll('{'+i+'}',n));
      return{text:txt,numbers:nums,ops:[...tmpl.ops],answer:ans};
    }
  }
  return{text:'3 + 5는 얼마일까요?',numbers:[3,5],ops:['+'],answer:8};
}

function wpSlotClick(i){if(S.done)return;SFX.click();S.wpActiveSlot=i;renderWordOpsGame();}
function wpOpSelect(op){
  if(S.done)return;SFX.select();
  S.wpUserOps[S.wpActiveSlot]=op;
  let next=-1;
  for(let i=S.wpActiveSlot+1;i<S.wpUserOps.length;i++){if(S.wpUserOps[i]==='?'){next=i;break;}}
  if(next===-1)for(let i=0;i<S.wpActiveSlot;i++){if(S.wpUserOps[i]==='?'){next=i;break;}}
  if(next!==-1)S.wpActiveSlot=next;
  renderWordOpsGame();
}
function checkWordOps(){
  if(S.done)return;
  const correct=S.wpUserOps.every((op,i)=>op===S.wp.ops[i]);
  S.done=true;stopTimer();
  S.wpUserOps.forEach((op,i)=>{
    const el=document.querySelector(`.wp-blank[data-s="${i}"]`);
    if(el)el.classList.add(op===S.wp.ops[i]?'correct-mark':'wrong-mark');
  });
  if(correct){onCorrect();}
  else{
    S.mistake=true;S.mistakeCount++;S.streak=0;$('uiStreak').textContent='0';
    setInst(`틀렸어요! 정답: ${S.wp.ops.join(' , ')}`,'err');
    showWPExplanation();$('nextBtn').style.display='inline-block';
    SFX.wrong();flash('red');
  }
}

// 공통 - 정답/시간초과

function onCorrect(){
  stopTimer();S.done=true;
  let pts=10,tb=0;
  if(!S.mistake&&!S.hintUsed){
    pts+=5;S.streak++;
    if(S.streak>S.maxStreak)S.maxStreak=S.streak;
    if(S.streak>=3)pts+=S.streak*2;
    tb=Math.ceil(S.timeLeft*0.5);pts+=tb;S.totalTimeBonus+=tb;
  } else {S.streak=0;}
  S.score+=pts;S.correct++;
  const sv=$('uiScore');sv.textContent=S.score;sv.classList.remove('pop');void sv.offsetWidth;sv.classList.add('pop');
  $('uiStreak').textContent=S.streak;
  setInst(`정답! +${pts}점`,'ok');
  SFX.correct();flash('green');

  if(tb>0){const b=$('tBonus');if(b){b.textContent=`⏱ 시간 보너스 +${tb}점!`;b.className='time-bonus show';}}

  // 콤보 표시
  if(S.streak>=3){
    SFX.combo(S.streak);
    const cb=$('comboBadge');
    cb.textContent=S.streak+'연속 🔥';
    cb.classList.remove('show');void cb.offsetWidth;cb.classList.add('show');
    setTimeout(()=>cb.classList.remove('show'),900);
  }

  // 업적 체크
  if(S.correct===1)unlockAchievement('first_correct');
  if(S.streak>=3)unlockAchievement('streak3');
  if(S.streak>=5)unlockAchievement('streak5');
  if(S.streak>=10)unlockAchievement('streak10');
  if(S.totalTimeBonus>=50)unlockAchievement('speed_demon');

  const st=STAGES[S.stageId-1];
  if(st.type==='order')showOrderExplanation();else showWPExplanation();
  $('nextBtn').style.display='inline-block';
}

function onTimeUp(){
  S.done=true;S.streak=0;S.timeoutCount++;
  $('uiStreak').textContent='0';
  SFX.timeup();flash('red');
  unlockAchievement('comeback');
  const st=STAGES[S.stageId-1];
  if(st.type==='order')revealOrder();
  else{
    if(st.type==='word-ops'){
      S.wp.ops.forEach((op,i)=>{const el=document.querySelector(`.wp-blank[data-s="${i}"]`);if(el){el.textContent=op;el.classList.add('correct-mark');}});
    } else {
      const d=$('ansDisp');if(d){d.textContent=S.wp.answer;d.classList.add('correct-ans');}
      document.querySelectorAll('.num-btn').forEach(b=>b.style.pointerEvents='none');
    }
  }
  setInst('⏰ 시간 초과! 정답을 확인하세요.','timeout');
  if(st.type!=='order')showWPExplanation();else showOrderExplanation();
  $('nextBtn').style.display='inline-block';
}

function revealOrder(){
  S.correctOrder.forEach((idx,step)=>{
    const el=document.querySelector(`.e-op[data-i="${idx}"]`);
    if(el&&!el.classList.contains('selected')){
      el.classList.add('revealed');
      el.innerHTML=S.expr.ops[idx]+`<div class="order-badge">${step+1}</div>`;
    }
  });
  document.querySelectorAll('.e-op').forEach(e=>e.classList.add('disabled'));
}

function showOrderExplanation(){
  const el=$('expl');if(!el)return;
  const{numbers,ops,parenGroups}=S.expr;
  let h='<h4>📝 풀이 순서</h4>';
  S.correctOrder.forEach((idx,step)=>{
    const d=getDepth(idx,parenGroups);
    let reason=d>=2?'(안쪽 괄호)':d===1?'(괄호 안 먼저)':
      (ops[idx]==='×'||ops[idx]==='÷')?'(곱셈/나눗셈 우선)':'(왼→오)';
    h+=`<div class="step"><span class="step-badge">${step+1}</span>${numbers[idx]} ${ops[idx]} ${numbers[idx+1]} ${reason}</div>`;
  });
  el.innerHTML=h;el.classList.add('show');
}
function showWPExplanation(){
  const el=$('expl');if(!el||!S.wp)return;
  const{numbers,ops,answer}=S.wp;
  let exprStr=numbers.map((n,i)=>i<ops.length?n+' '+ops[i]:n).join(' ');
  let h=`<h4>📝 풀이</h4><div class="step"><span class="step-badge">식</span>${exprStr}</div>`;
  h+=`<div class="step"><span class="step-badge">=</span>${answer}</div>`;
  el.innerHTML=h;el.classList.add('show');
}
function setInst(t,cls){const el=$('inst');if(el){el.textContent=t;el.className='instruction'+(cls?' '+cls:'');}}

function timerHTML(){
  return`<div class="timer-wrap"><div class="timer-track"><div class="timer-fill"></div></div><div class="timer-row"><span>남은 시간</span><span class="timer-sec"></span></div></div>`;
}

// ============================================================
// 힌트 / 리셋
// ============================================================
function doHint(){
  if(S.done)return;
  SFX.click();
  S.hintUsed=true;S.hintUsedThisGame=true;
  const st=STAGES[S.stageId-1];
  if(st.type==='order'){
    if(S.step>=S.correctOrder.length)return;
    const idx=S.correctOrder[S.step];
    const el=document.querySelector(`.e-op[data-i="${idx}"]`);
    if(el){
      el.style.borderColor='#fbbf24';el.style.boxShadow='0 0 16px rgba(251,191,36,.5)';
      setTimeout(()=>{if(!el.classList.contains('selected')&&!el.classList.contains('revealed')){el.style.borderColor='';el.style.boxShadow='';}},1800);
    }
    const d=getDepth(idx,S.expr.parenGroups);
    const op=S.expr.ops[idx];
    setInst('💡 '+(d>0?'괄호 안을 먼저!':(op==='×'||op==='÷')?'곱셈/나눗셈이 먼저!':'왼쪽에서 오른쪽 순서!'),'');
  } else if(st.type==='word-ops'){
    for(let i=0;i<S.wpUserOps.length;i++){
      if(S.wpUserOps[i]==='?'||S.wpUserOps[i]!==S.wp.ops[i]){
        setInst(`💡 ${i+1}번째 기호는 "${S.wp.ops[i]}" 입니다!`,'');break;
      }
    }
  } else {
    setInst(`💡 정답은 ${String(S.wp.answer).charAt(0)}으로 시작해요!`,'');
  }
}

function resetQ(){
  if(S.done&&S.timeLeft<=0)return;
  SFX.click();
  stopTimer();
  S.userOrder=[];S.step=0;S.mistake=false;S.done=false;S.wpAnswer='';
  S.wpUserOps=S.wp?S.wp.ops.map(()=>'?'):[];S.wpActiveSlot=0;
  $('nextBtn').style.display='none';
  const st=STAGES[S.stageId-1];
  if(st.type==='order')renderOrderGame();
  else if(st.type==='word-ops')renderWordOpsGame();
  else renderWordAnswerGame();
  startTimer();
}

// ============================================================
// 결과 화면
// ============================================================
function showResults(){
  stopTimer();
  const pct=Math.round(S.correct/TOTAL_Q*100);
  let grade,gradeClass,emoji,title,msg;
  if(pct>=100&&!S.mistakeCount){grade='S';gradeClass='grade-s';emoji='👑';title='퍼펙트!';msg='실수 없이 전부 맞췄어요! 완벽한 실력이에요.';}
  else if(pct>=90){grade='A+';gradeClass='grade-a';emoji='🏆';title='최고야!';msg='거의 완벽해요! 조금만 더 다듬으면 S등급!';}
  else if(pct>=70){grade='A';gradeClass='grade-a';emoji='🎉';title='잘했어요!';msg='꽤 잘하고 있어요. 더 도전해보세요!';}
  else if(pct>=50){grade='B';gradeClass='grade-b';emoji='💪';title='좋은 시작!';msg='규칙을 다시 확인하고 도전해보세요!';}
  else{grade='C';gradeClass='grade-c';emoji='📚';title='더 연습해봐요!';msg='연산 순서 규칙을 복습하고 다시 도전!';}

  $('mEmoji').textContent=emoji;
  $('mTitle').textContent=title;
  $('mMsg').textContent=msg;
  $('mGrade').textContent='등급: '+grade;
  $('mGrade').className='result-grade '+gradeClass;
  $('mScore').textContent=S.score;
  $('mCorrect').textContent=pct+'%';
  $('mStreak').textContent=S.maxStreak;
  $('mTime').textContent='+'+S.totalTimeBonus;

  // 업적 체크
  if(!S.hintUsedThisGame&&S.correct>0)unlockAchievement('no_hint');
  if(S.mistakeCount===0&&S.correct>0)unlockAchievement('no_mistake');
  if(S.score>=500)unlockAchievement('score500');
  if(S.score>=1000)unlockAchievement('score1000');
  if(S.stageId===5&&grade==='S')unlockAchievement('stage5_s');

  // 별점 저장
  const stars=pct>=90?3:pct>=70?2:pct>=50?1:0;
  if(!Save.stageStars[S.stageId]||stars>Save.stageStars[S.stageId])Save.stageStars[S.stageId]=stars;

  // 총점 / 최고연속 업데이트
  Save.totalScore+=S.score;
  if(S.maxStreak>Save.bestStreak)Save.bestStreak=S.maxStreak;

  // 랭킹 저장
  const rankEntry={score:S.score,stage:S.stageId,diff:['쉬움','보통','어려움'][S.diff-1],pct,date:new Date().toLocaleDateString('ko-KR')};
  Save.rankingScores.push(rankEntry);
  Save.rankingScores.sort((a,b)=>b.score-a.score);
  if(Save.rankingScores.length>20)Save.rankingScores=Save.rankingScores.slice(0,20);

  writeSave();
  $('resultModal').classList.add('show');
}

// ============================================================
// 업적 / 랭킹 모달
// ============================================================
function showAchievements(){
  SFX.click();
  $('achieveGrid').innerHTML=ACHIEVEMENTS.map(a=>{
    const unlocked=!!Save.achievements[a.id];
    return`<div class="ach-item ${unlocked?'unlocked':'locked'}">
      <div class="ach-icon">${a.icon}</div>
      <div class="ach-name">${a.name}</div>
      <div class="ach-desc">${a.desc}</div>
    </div>`;
  }).join('');
  $('achieveModal').classList.add('show');
}

function showRanking(){
  SFX.click();
  const list=$('rankList');
  if(!Save.rankingScores||Save.rankingScores.length===0){
    list.innerHTML=`<li style="text-align:center;color:var(--muted);padding:20px">아직 기록이 없어요!<br>게임을 플레이해서 기록을 남겨보세요.</li>`;
  } else {
    list.innerHTML=Save.rankingScores.map((r,i)=>{
      const numClass=i===0?'gold':i===1?'silver':i===2?'bronze':'';
      const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1;
      return`<li class="rank-item ${i===0?'me':''}">
        <div class="rank-num ${numClass}">${medal}</div>
        <div class="rank-info">
          <div class="rank-name">STAGE ${r.stage}</div>
          <div class="rank-detail">${r.diff} · 정답률 ${r.pct}% · ${r.date}</div>
        </div>
        <div class="rank-score">${r.score}점</div>
      </li>`;
    }).join('');
  }
  $('rankModal').classList.add('show');
}

// ============================================================
// 초기화
// ============================================================
updateMainStats();
renderStages();
</script>
</body>
</html>
