<style>
    @font-face {
        font-family: 'NeoDunggeunmo';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.3/NeoDunggeunmo.woff') format('woff');
        font-weight: normal;
        font-style: normal;
    }
    body {
        font-family: 'NeoDunggeunmo', sans-serif;
        background-color: #000;
        color: #fff;
        user-select: none;
        overflow-x: hidden;
        margin: 0;
        padding: 0;
    }
    .pixel-box {
        background-color: #0000AA;
        border: 4px solid #fff;
        box-shadow: inset -4px -4px 0px 0px rgba(0,0,0,0.5), inset 4px 4px 0px 0px rgba(255,255,255,0.3);
        image-rendering: pixelated;
    }
    .pixel-button {
        background-color: #AA0000;
        color: white;
        border: 4px solid #fff;
        box-shadow: inset -4px -4px 0px 0px rgba(0,0,0,0.5);
        cursor: pointer;
        transition: transform 0.1s;
    }
    .pixel-button:hover {
        background-color: #D40000;
    }
    .pixel-button:active {
        transform: scale(0.95);
        box-shadow: inset 4px 4px 0px 0px rgba(0,0,0,0.5);
    }
    .pixel-input {
        background-color: #000;
        color: #00FF00;
        border: 4px solid #fff;
        padding: 8px;
        outline: none;
        font-family: 'NeoDunggeunmo', sans-serif;
    }
    .pixel-input:focus {
        border-color: #FFFF00;
    }
    .fraction-line {
        border-bottom: 2px solid currentcolor;
    }
    .scanlines {
        position: fixed;
        top: 0; left: 0; width: 100vw; height: 100vh;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        background-size: 100% 4px, 6px 100%;
        pointer-events: none;
        z-index: 50;
    }
</style>
</head>

<div id="root">
    <div style="padding:40px; text-align:center; font-family:sans-serif; color:#fff;">
        로딩 중... 화면이 계속 이 상태라면 인터넷 연결 또는 방화벽에서 cdn.jsdelivr.net이 차단되었을 수 있습니다.
    </div>
</div>

            '<p>' + (e.message || '알 수 없는 오류') + '</p>' +
